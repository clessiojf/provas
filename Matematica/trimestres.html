<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matemática - Selecione o Trimestre</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        header {
            background: linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%);
            color: white;
            width: 100%;
            padding: 30px 0;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        h2 { margin: 0; font-size: 1.8em; }

        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 500px;
        }

        .card-trimestre {
            background: white;
            border-radius: 12px;
            text-decoration: none;
            color: #333;
            display: flex;
            align-items: center;
            padding: 20px;
            transition: all 0.2s ease;
            border-left: 8px solid #4ca1af;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card-trimestre:hover {
            transform: translateX(10px);
            background-color: #f8f9fa;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .numero {
            font-size: 1.5em;
            font-weight: bold;
            color: #4ca1af;
            margin-right: 20px;
            min-width: 40px;
        }

        .texto {
            font-size: 1.1em;
            font-weight: 500;
        }

        .btn-voltar {
            margin-top: 30px;
            text-decoration: none;
            color: #666;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .btn-voltar:hover {
            color: #1e3c72;
        }
    </style>
</head>
<body>

    <header>
        <h2>Matemática</h2>
        <p>Em qual período estamos?</p>
    </header>

    <div class="container">
        <a href="1_Trimestre/lista_provas.html" class="card-trimestre">
            <div class="numero">01</div>
            <div class="texto">1º Trimestre</div>
        </a>

        <a href="2_Trimestre/lista_provas.html" class="card-trimestre">
            <div class="numero">02</div>
            <div class="texto">2º Trimestre</div>
        </a>

        <a href="3_Trimestre/lista_provas.html" class="card-trimestre">
            <div class="numero">03</div>
            <div class="texto">3º Trimestre</div>
        </a>
    </div>

    <a href="../index.html" class="btn-voltar">⬅ Voltar para o Início</a>
<script>
    // Bloqueia o clique direito
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Bloqueia atalhos de desenvolvedor (F12, Ctrl+Shift+I, etc)
    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0))) {
            return false;
        }
    }
</script>
</body>
</html>
